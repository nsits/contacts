<!DOCTYPE html>
<html class="theme-dark" lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>Sanju Thakur | NetSecure IT</title>
    <meta name="description" content="NetSecure IT - Designed to Connect. Built to Protect.">
    
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

    <style>
      /* Base background */
      body {
        background-color: #020617 !important;
        color: #ffffff !important;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow-x: hidden;
      }

      /* Subtle ambient background glow */
      body::before {
        content: '';
        position: fixed;
        top: -10%; left: -10%;
        width: 300px; height: 300px;
        background: #00e5ff;
        border-radius: 50%;
        filter: blur(150px);
        opacity: 0.1;
        z-index: -1;
      }

      /* Logo Wrapper & Electric Glowing Line */
      .avatar-wrapper {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 20px;
        width: 100%;
      }
      
      .electric-line {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100vw;
        height: 2px;
        background: linear-gradient(90deg, transparent, #00e5ff, transparent);
        z-index: 1;
        animation: pulseLine 2s infinite alternate ease-in-out;
      }

      @keyframes pulseLine {
        0% { opacity: 0.2; transform: translate(-50%, -50%) scaleX(0.8); box-shadow: 0 0 5px #00e5ff; }
        100% { opacity: 1; transform: translate(-50%, -50%) scaleX(1.1); box-shadow: 0 0 20px #00e5ff, 0 0 40px #00e5ff; }
      }

      .avatar {
        position: relative;
        border: 2px solid #00e5ff !important;
        background-color: #020617;
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
        z-index: 2;
      }

      /* Text Styling */
      h1 { color: #ffffff !important; margin-bottom: 5px !important; font-weight: 800; letter-spacing: 0.5px; }
      p { color: #94a3b8 !important; font-size: 15px; margin-bottom: 30px !important; line-height: 1.6; }
      .tagline { color: #00e5ff !important; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0, 229, 255, 0.3); }

      /* Buttons */
      .button-tech {
        position: relative;
        overflow: hidden;
        background: rgba(15, 23, 42, 0.5) !important;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 229, 255, 0.2) !important;
        color: #ffffff !important;
        border-radius: 8px !important;
        font-weight: 500;
        letter-spacing: 1px;
        text-transform: uppercase;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3) !important;
        transition: all 0.3s ease !important;
        margin-bottom: 16px !important;
        cursor: pointer;
      }

      .button-tech::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 50%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.15), transparent);
        animation: scannerSweep 3s infinite linear;
      }
      @keyframes scannerSweep { 0% { left: -100%; } 50% { left: 200%; } 100% { left: 200%; } }

      .button-tech:hover {
        border-color: rgba(0, 229, 255, 0.8) !important;
        background: rgba(15, 23, 42, 0.8) !important;
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.2) !important;
        transform: translateY(-2px);
      }
      .button-tech .icon { filter: brightness(0) invert(1); position: relative; z-index: 2; }

      .footer-text { text-align: center; color: #475569; font-size: 12px; margin-top: 40px; }

      /* --- QR Code Modal Popup Styling --- */
      .qr-modal {
        display: none; /* Hidden by default */
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(2, 6, 23, 0.9);
        backdrop-filter: blur(5px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }
      .qr-content {
        background: #0f172a;
        padding: 30px;
        border-radius: 12px;
        border: 1px solid #00e5ff;
        text-align: center;
        box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
        max-width: 90%;
      }
      .qr-content h3 { color: #00e5ff; margin-bottom: 10px; font-weight: bold; }
      .qr-content p { font-size: 13px; margin-bottom: 20px !important; }
      .qr-content img {
        margin: 0 auto 20px auto;
        border-radius: 8px;
        border: 8px solid white; /* Ensures scanners can read it against the dark theme */
        display: block;
      }
      .close-btn {
        background: rgba(0, 229, 255, 0.1);
        border: 1px solid #00e5ff;
        color: white;
        padding: 10px 25px;
        border-radius: 6px;
        cursor: pointer;
        text-transform: uppercase;
        font-weight: bold;
        transition: 0.3s;
      }
      .close-btn:hover { background: #00e5ff; color: black; }
    </style>
  </head>

<body>
    <div class="container">
        <div class="column">

            <div class="avatar-wrapper">
              <div class="electric-line"></div>
              <img class="avatar avatar--rounded" src="images/avatar.png" alt="NetSecure IT Logo">
            </div>

            <h1>
              <div>Sanju Thakur</div>
            </h1>

            <p>
              IT Infrastructure & Technical Engineer<br>
              <br>
              <span class="tagline">Designed to Connect. Built to Protect.</span>
            </p>

            <div class="button-stack" role="navigation">

              <a class="button button-tech" href="https://api.whatsapp.com/send?phone=916290216490" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/whatsapp.svg" alt="WhatsApp Icon">Chat on WhatsApp
              </a>

              <a class="button button-tech" href="#" onclick="handlePaymentClick(event)" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/generic-shopping-bag.svg" alt="Pay Icon">Pay Advance Payment
              </a>

              <a class="button button-tech" href="tel:6290216490" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/generic-phone.svg" alt="Phone Icon">Press to Call
              </a>

            </div>
            </div>
        
        <p class="footer-text">© 2026 NetSecure IT. All Rights Reserved.</p>
    </div>

    <div id="qrModal" class="qr-modal" onclick="closeQRModal(event)">
      <div class="qr-content" onclick="event.stopPropagation()">
        <h3>Scan to Pay</h3>
        <p>Open GPay, PhonePe, or Paytm and scan this code.</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=sanjukumar9433-5@okaxis" alt="NetSecure IT UPI QR Code">
        <button class="close-btn" onclick="closeQRModal(event)">Close</button>
      </div>
    </div>

    <script>
      function handlePaymentClick(event) {
        event.preventDefault(); // Stops the button from refreshing the page
        
        // Checks if the user is on a mobile phone (Android, iPhone, iPad, etc.)
        var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        if (isMobile) {
          // MOBILE BEHAVIOR: Show warning, then redirect to app
          if (confirm('Pay only if you are asked to pay. Do you want to continue?')) {
            window.location.href = "upi://pay?pa=sanjukumar9433-5@okaxis";
          }
        } else {
          // DESKTOP BEHAVIOR: Open the QR code popup
          document.getElementById('qrModal').style.display = 'flex';
        }
      }

      function closeQRModal(event) {
        // Hides the popup when clicking 'Close' or outside the box
        document.getElementById('qrModal').style.display = 'none';
      }
    </script>
</body>
</html>
