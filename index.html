<!DOCTYPE html>
<html class="theme-dark" lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>Sanju Thakur | NetSecure IT</title>
    <meta name="description" content="NetSecure IT - Designed to Connect. Built to Protect.">
    
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

    <style>
      /* Deep black/blue cyber gradient background */
      body {
        background-color: #0b0f19 !important;
        background-image: radial-gradient(circle at top right, #111827, #000000) !important;
        color: #ffffff !important;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      /* Glowing Avatar styling matching the shield logo */
      .avatar {
        border: 2px solid #00e5ff;
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
        background-color: #1a1a1a;
      }

      /* Cyan Header Text */
      h1 {
        color: #00e5ff !important;
        margin-bottom: 5px !important;
        font-weight: bold;
        letter-spacing: 0.5px;
      }

      /* Subtitle Styling */
      p {
        color: #94a3b8 !important;
        font-size: 15px;
        margin-bottom: 30px !important;
        line-height: 1.5;
      }

      .tagline {
        color: #e2e8f0 !important;
        font-style: italic;
        font-size: 14px;
      }

      /* Custom Tech Buttons */
      .button-tech {
        background-color: rgba(0, 229, 255, 0.05) !important;
        border: 1px solid #00e5ff !important;
        color: #ffffff !important;
        border-radius: 8px !important;
        font-weight: 600;
        letter-spacing: 0.5px;
        transition: all 0.3s ease;
        box-shadow: inset 0 0 10px rgba(0, 229, 255, 0.05);
      }

      /* Button Hover Effect */
      .button-tech:hover {
        background-color: rgba(0, 229, 255, 0.2) !important;
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        border-color: #ffffff !important;
      }
      
      /* Pure white icons for contrast */
      .button-tech .icon {
        filter: brightness(0) invert(1);
      }

      /* Footer styling */
      .footer-text {
        text-align: center; 
        color: #475569; 
        font-size: 12px; 
        margin-top: 40px;
      }
    </style>
  </head>

<body>
    <div class="container">
        <div class="column">

            <img class="avatar avatar--rounded" src="images/avatar.png" alt="NetSecure IT Logo">

            <h1>
              <div>Sanju Thakur</div>
            </h1>

            <p>
              IT Infrastructure & Technical Engineer<br>
              <span class="tagline">"Designed to Connect. Built to Protect."</span>
            </p>

            <div class="button-stack" role="navigation">

              <a class="button button-tech" href="https://api.whatsapp.com/send?phone=916290216490" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/whatsapp.svg" alt="WhatsApp Icon">Chat on WhatsApp
              </a>

              <a class="button button-tech" href="upi://pay?pa=sanjukumar9433-5@okaxis" onclick="return confirm('Pay only if you are asked to pay. Do you want to continue?');" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/generic-shopping-bag.svg" alt="Pay Icon">Pay Advance Payment
              </a>

              <a class="button button-tech" href="tel:6290216490" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/generic-phone.svg" alt="Phone Icon">Press to Call
              </a>

            </div>
            </div>
        
        <p class="footer-text">© 2026 NetSecure IT. All Rights Reserved.</p>
    </div>
</body>
</html>
