<!DOCTYPE html>

  <head>
    <meta charset="utf-8">

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

    <style>
      /* Base background */
      body {
        background-color: #020617 !important; /* Deepest tech black */
        color: #ffffff !important;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow-x: hidden;
      }

      /* Moving Ambient Background Lights */
      body::before, body::after {
        content: '';
        position: fixed;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.15;
        z-index: -1;
      }
      body::before {
        top: -10%; left: -10%;
        width: 300px; height: 300px;
        background: #00e5ff;
        animation: driftLight 15s infinite alternate ease-in-out;
      }
      body::after {
        bottom: -10%; right: -10%;
        width: 400px; height: 400px;
        background: #3b82f6;
        animation: driftDark 20s infinite alternate ease-in-out;
      }

      @keyframes driftLight { 100% { transform: translate(30vw, 20vh); } }
      @keyframes driftDark { 100% { transform: translate(-30vw, -20vh); } }

      /* Avatar with slow rotating radar ring */
      .avatar-wrapper {
        position: relative;
        display: inline-block;
        margin-bottom: 10px;
      }
      .avatar {
        position: relative;
        border: none !important;
        background-color: transparent;
        z-index: 2;
      }
      .avatar-wrapper::before {
        content: '';
        position: absolute;
        top: -4px; left: -4px; right: -4px; bottom: -4px;
        border-radius: 50%;
        border: 2px dashed rgba(0, 229, 255, 0.6);
        animation: rotateRadar 10s linear infinite;
        z-index: 1;
      }
      @keyframes rotateRadar { 100% { transform: rotate(360deg); } }

      /* Text Styling */
      h1 {
        color: #ffffff !important;
        margin-bottom: 5px !important;
        font-weight: 800;
        letter-spacing: 0.5px;
      }
      p {
        color: #94a3b8 !important;
        font-size: 15px;
        margin-bottom: 30px !important;
        line-height: 1.6;
      }
      .tagline {
        color: #00e5ff !important;
        font-size: 13px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }

      /* Modern Frosted Glass Buttons (Flat but alive) */
      .button-tech {
        position: relative;
        overflow: hidden;
        background: rgba(15, 23, 42, 0.5) !important; /* Semi-transparent */
        backdrop-filter: blur(12px); /* Frosted glass effect */
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 229, 255, 0.2) !important; /* Very subtle border */
        color: #ffffff !important;
        border-radius: 8px !important; /* Sharp, modern corners */
        font-weight: 500;
        letter-spacing: 1px;
        text-transform: uppercase;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3) !important;
        transition: all 0.3s ease !important;
        margin-bottom: 16px !important;
      }

      /* Continuous sweeping light reflection across buttons */
      .button-tech::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 50%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.15), transparent);
        animation: scannerSweep 3s infinite linear;
      }
      @keyframes scannerSweep {
        0% { left: -100%; }
        50% { left: 200%; }
        100% { left: 200%; } /* Pauses slightly before sweeping again */
      }

      /* Hover Effect */
      .button-tech:hover {
        border-color: rgba(0, 229, 255, 0.8) !important;
        background: rgba(15, 23, 42, 0.8) !important;
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.2) !important;
        transform: translateY(-2px);
      }
      
      .button-tech .icon {
        filter: brightness(0) invert(1);
        position: relative;
        z-index: 2;
      }

      .footer-text {
        text-align: center; 
        color: #475569; 
        font-size: 12px; 
        margin-top: 40px;
      }
    </style>
  </head>

<body>
