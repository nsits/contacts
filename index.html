<!DOCTYPE html>
<html class="theme-dark" lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>Sanju Thakur | NetSecure IT</title>
    <meta name="description" content="NetSecure IT - Designed to Connect. Built to Protect.">
    
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

    <style>
      /* Base background */
      body {
        background-color: #020617 !important; /* Deepest tech black */
        color: #ffffff !important;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow-x: hidden;
      }

      /* Subtle ambient background glow */
      body::before {
        content: '';
        position: fixed;
        top: -10%; left: -10%;
        width: 300px; height: 300px;
        background: #00e5ff;
        border-radius: 50%;
        filter: blur(150px);
        opacity: 0.1;
        z-index: -1;
      }

      /* Logo Wrapper & Electric Glowing Line */
      .avatar-wrapper {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 20px;
        width: 100%;
      }
      
      /* The horizontal circuit line behind the logo */
      .electric-line {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100vw;
        height: 2px;
        background: linear-gradient(90deg, transparent, #00e5ff, transparent);
        z-index: 1;
        animation: pulseLine 2s infinite alternate ease-in-out;
      }

      @keyframes pulseLine {
        0% { 
          opacity: 0.2; 
          transform: translate(-50%, -50%) scaleX(0.8); 
          box-shadow: 0 0 5px #00e5ff; 
        }
        100% { 
          opacity: 1; 
          transform: translate(-50%, -50%) scaleX(1.1); 
          box-shadow: 0 0 20px #00e5ff, 0 0 40px #00e5ff; 
        }
      }

      /* Keep the logo sharp and glowing */
      .avatar {
        position: relative;
        border: 2px solid #00e5ff !important;
        background-color: #020617;
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
        z-index: 2; /* Sits above the electric line */
      }

      /* Text Styling */
      h1 {
        color: #ffffff !important;
        margin-bottom: 5px !important;
        font-weight: 800;
        letter-spacing: 0.5px;
      }
      p {
        color: #94a3b8 !important;
        font-size: 15px;
        margin-bottom: 30px !important;
        line-height: 1.6;
      }
      .tagline {
        color: #00e5ff !important;
        font-size: 13px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
      }

      /* Modern Frosted Glass Buttons */
      .button-tech {
        position: relative;
        overflow: hidden;
        background: rgba(15, 23, 42, 0.5) !important;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 229, 255, 0.2) !important;
        color: #ffffff !important;
        border-radius: 8px !important;
        font-weight: 500;
        letter-spacing: 1px;
        text-transform: uppercase;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3) !important;
        transition: all 0.3s ease !important;
        margin-bottom: 16px !important;
      }

      /* Button Light Sweep */
      .button-tech::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 50%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.15), transparent);
        animation: scannerSweep 3s infinite linear;
      }
      @keyframes scannerSweep {
        0% { left: -100%; }
        50% { left: 200%; }
        100% { left: 200%; }
      }

      /* Button Hover */
      .button-tech:hover {
        border-color: rgba(0, 229, 255, 0.8) !important;
        background: rgba(15, 23, 42, 0.8) !important;
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.2) !important;
        transform: translateY(-2px);
      }
      
      .button-tech .icon {
        filter: brightness(0) invert(1);
        position: relative;
        z-index: 2;
      }

      .footer-text {
        text-align: center; 
        color: #475569; 
        font-size: 12px; 
        margin-top: 40px;
      }
    </style>
  </head>

<body>
    <div class="container">
        <div class="column">

            <div class="avatar-wrapper">
              <div class="electric-line"></div>
              <img class="avatar avatar--rounded" src="images/avatar.png" alt="NetSecure IT Logo">
            </div>

            <h1>
              <div>Sanju Thakur</div>
            </h1>

            <p>
              IT Infrastructure & Technical Engineer<br>
              <br>
              <span class="tagline">Designed to Connect. Built to Protect.</span>
            </p>

            <div class="button-stack" role="navigation">

              <a class="button button-tech" href="https://api.whatsapp.com/send?phone=916290216490" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/whatsapp.svg" alt="WhatsApp Icon">Chat on WhatsApp
              </a>

              <a class="button button-tech" href="upi://pay?pa=sanjukumar9433-5@okaxis" onclick="return confirm('Pay only if you are asked to pay. Do you want to continue?');" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/generic-shopping-bag.svg" alt="Pay Icon">Pay Advance Payment
              </a>

              <a class="button button-tech" href="tel:6290216490" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/generic-phone.svg" alt="Phone Icon">Press to Call
              </a>

            </div>
            </div>
        
        <p class="footer-text">© 2026 NetSecure IT. All Rights Reserved.</p>
    </div>
</body>
</html>
