<!DOCTYPE html>
<html class="theme-dark" lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>Sanju Thakur | NetSecure IT</title>
    <meta name="description" content="NetSecure IT - Designed to Connect. Built to Protect.">
    
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

    <style>
      /* Animated shifting gradient background */
      @keyframes movingBackground {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      body {
        background: linear-gradient(-45deg, #0b0f19, #1e293b, #001f3f, #050505) !important;
        background-size: 400% 400% !important;
        animation: movingBackground 12s ease infinite !important;
        color: #ffffff !important;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      /* Pulsing glow animation for the logo */
      @keyframes pulseGlow {
        0% { box-shadow: 0 0 10px rgba(0, 229, 255, 0.4); }
        50% { box-shadow: 0 0 25px rgba(0, 229, 255, 0.9), 0 0 10px #0072ff; }
        100% { box-shadow: 0 0 10px rgba(0, 229, 255, 0.4); }
      }

      .avatar {
        border: 3px solid #00e5ff;
        background-color: #1a1a1a;
        animation: pulseGlow 2.5s infinite;
      }

      /* Brighter, bolder text */
      h1 {
        color: #ffffff !important;
        text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        margin-bottom: 5px !important;
        font-weight: 800;
        letter-spacing: 0.5px;
      }

      p {
        color: #e2e8f0 !important;
        font-size: 15px;
        margin-bottom: 30px !important;
        line-height: 1.6;
      }

      .tagline {
        color: #00e5ff !important;
        font-weight: bold;
        font-size: 14px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      /* Solid, vibrant pill-shaped buttons with depth */
      .button-tech {
        background: linear-gradient(90deg, #0052d4, #4364f7, #6fb1fc) !important;
        border: none !important;
        color: #ffffff !important;
        border-radius: 50px !important; /* Makes them rounded pill shapes */
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        box-shadow: 0 4px 15px rgba(67, 100, 247, 0.4);
        transition: all 0.3s ease-in-out !important;
        margin-bottom: 16px !important;
      }

      /* Button Hover/Tap Effect (Lifts up and glows brighter) */
      .button-tech:hover {
        transform: translateY(-4px) scale(1.02);
        box-shadow: 0 8px 25px rgba(0, 229, 255, 0.6);
      }
      
      /* Pure white icons for maximum contrast */
      .button-tech .icon {
        filter: brightness(0) invert(1);
      }

      .footer-text {
        text-align: center; 
        color: #64748b; 
        font-size: 12px; 
        margin-top: 40px;
      }
    </style>
  </head>

<body>

            <p>

            </p>

                <img class="icon" aria-hidden="true" src="images/icons/whatsapp.svg" alt="WhatsApp Icon">Chat on WhatsApp
              </a>

              <a class="button button-tech" href="upi://pay?pa=sanjukumar9433-5@okaxis" onclick="return confirm('Pay only if you are asked to pay. Do you want to continue?');" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/generic-shopping-bag.svg" alt="Pay Icon">Pay Advance Payment
              </a>

              <a class="button button-tech" href="tel:6290216490" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/generic-phone.svg" alt="Phone Icon">Press to Call
              </a>

            </div>
            </div>
        
        <p class="footer-text">© 2026 NetSecure IT. All Rights Reserved.</p>
    </div>
</body>
</html>
